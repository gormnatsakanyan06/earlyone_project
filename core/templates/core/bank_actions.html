{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Selection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #0a0f1a; font-family: 'Inter', sans-serif; overflow: hidden; }
    .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
    .category-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .category-btn:hover { transform: translateX(8px); background-color: #f8fafc; border-color: #2B90D2; }
  </style>
</head>
<body>

  <div class="relative w-full max-w-lg mx-auto p-4">
    <div class="glass-effect rounded-[2.5rem] shadow-2xl p-6 md:p-10 relative overflow-hidden">
      
      <div class="relative z-10 mb-8">
          <div class="flex items-center justify-between mb-4">
              <button onclick="history.back()" class="p-2 rounded-xl border border-slate-100 bg-white text-slate-400 shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
              </button>
              <div class="bg-white p-2 rounded-xl border border-slate-100 shadow-sm">
                <img src="{% static 'images/'|add:logo %}" alt="Logo" class="h-6 w-auto">
              </div>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-900">Ընտրեք ծառայությունը</h2>
      </div>

      <div class="flex flex-col space-y-4 relative z-10">
        
        <a href="{% url 'datetime_selection' service_slug branch_name 'cards' %}" 
           class="category-btn group flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 text-left shadow-sm">
            <div class="flex items-center space-x-4">
                <div class="p-2.5 bg-white rounded-xl border border-slate-100 text-slate-500 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <span class="text-slate-800 font-bold text-lg">Քարտերի սպասարկում</span>
            </div>
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
        </a>

        <a href="{% url 'datetime_selection' service_slug branch_name 'loans' %}" 
           class="category-btn group flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-4 text-left shadow-sm">
            <div class="flex items-center space-x-4">
                <div class="p-2.5 bg-white rounded-xl border border-slate-100 text-slate-500 shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <span class="text-slate-800 font-bold text-lg">Վարկ/Վարկային գիծ</span>
            </div>
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>
        </a>
        <a href="{% url 'datetime_selection' service_slug branch_name 'deposits' %}" 
       class="category-btn group flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 md:py-4 text-left shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="icon-box p-2.5 bg-white rounded-xl border border-slate-100 text-slate-500 shadow-sm transition-all">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 14v3m4-3v3m4-3v3M3 21h18M3 10h18M3 7l9-4 9 4M4 10h16v11H4V10z"></path></svg>
            </div>
            <span class="text-slate-800 font-bold text-base md:text-lg">Ավանդներ</span>
        </div>
        <svg class="w-4 h-4 md:w-5 md:h-5 text-slate-300 transition-colors group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
    </a>

    <a href="{% url 'datetime_selection' service_slug branch_name 'cash' %}" 
       class="category-btn group flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 md:py-4 text-left shadow-sm">
        <div class="flex items-center space-x-4">
            <div class="icon-box p-2.5 bg-white rounded-xl border border-slate-100 text-slate-500 shadow-sm transition-all">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.407 2.631 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.407-2.631-1M12 16v-1m4-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="text-slate-800 font-bold text-base md:text-lg">Կանխիկ գործարքներ</span>
        </div>
        <svg class="w-4 h-4 md:w-5 md:h-5 text-slate-300 transition-colors group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
    </a>

      </div>

      <div class="mt-8 text-center">
          <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.25em]">Earlyone © 2026</p>
      </div>
    </div>
  </div>

</body>
</html>
