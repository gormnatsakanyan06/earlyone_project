{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ name }} - Branches</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background: #0a0f1a !important;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
    }

    .glass-effect {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .category-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Standardized Blue Hover for all Government Services */
    .category-btn:hover {
      transform: translateX(8px);
      border-color: #2563eb;
      background-color: #f8fafc;
    }
  </style>
</head>
<body>

  <div style="position: fixed; top: -10%; left: -10%; width: 40%; height: 40%; background: rgba(37, 99, 235, 0.1); border-radius: 50%; filter: blur(120px); pointer-events: none;"></div>

  <div style="position: relative; width: 100%; max-width: 512px; z-index: 10; padding: 1rem;">
    <div class="glass-effect" style="border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 2.5rem; overflow: hidden;">
      
      <div style="position: relative; z-index: 10;">
        <div style="margin-bottom: 2rem;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
              <a href="{% url 'government' %}" style="display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 0.75rem; border: 1px solid #f1f5f9; background: white; color: #94a3b8; text-decoration: none;">
                <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
              </a>
              <div style="background: white; padding: 0.5rem; border-radius: 0.75rem; border: 1px solid #f1f5f9; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <img src="{% static 'images/'|add:logo %}" alt="Logo" style="height: 28px; width: auto;">
              </div>
          </div>
          
          <h2 style="font-size: 1.5rem; font-weight: 800; color: #0f172a; margin: 0; line-height: 1.2;">{{ name }}</h2>
          <p style="color: #64748b; font-size: 0.875rem; font-weight: 500; margin-top: 0.5rem;">Ընտրեք սպասարկող ստորաբաժանումը</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 1rem;">
          {% for branch in branches %}
          <a href="{% url 'government_actions' service_slug branch.name %}" class="category-btn" style="display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 1.25rem; padding: 1rem 1.25rem; text-decoration: none;">
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div style="padding: 0.625rem; background: white; border-radius: 0.75rem; border: 1px solid #f1f5f9; color: #94a3b8;">
                <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
              </div>
              <div>
                <span style="color: #1e293b; font-weight: 700; font-size: 1rem; display: block;">{{ branch.name }}</span>
                <span style="color: #94a3b8; font-size: 0.75rem; font-weight: 500;">{{ branch.address }}</span>
              </div>
            </div>
            <svg style="width: 20px; height: 20px; color: #cbd5e1;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
          </a>
          {% empty %}
          <p style="text-align: center; color: #94a3b8; padding: 1rem 0;">Մասնաճյուղեր չեն գտնվել:</p>
          {% endfor %}
        </div>

        <div style="margin-top: 2.5rem; text-align: center;">
            <p style="color: #94a3b8; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em;">Earlyone © 2026</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
