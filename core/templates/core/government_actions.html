{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Selection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { 
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      background: #0a0f1a !important;
      font-family: 'Inter', sans-serif; 
      overflow: hidden; 
    }
    .glass-effect {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .category-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .category-btn:hover {
      transform: translateX(8px);
      background-color: #f8fafc;
      border-color: #2B90D2; 
    }
    .category-btn:hover .icon-box {
      background-color: #eff6ff;
      color: #2B90D2;
      border-color: #bfdbfe;
    }
    .back-btn:hover {
      background-color: #f1f5f9;
      color: #2B90D2;
      border-color: #2B90D2;
    }
    .logo-accent {
      opacity: 0.08;
      transform: rotate(15deg) scale(1.2);
    }
  </style>
</head>
<body>

  <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="relative w-full max-w-lg mx-auto p-4">
    <div class="glass-effect rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-6 md:p-10 relative overflow-hidden">
      
      <div class="absolute -top-12 -right-16 w-64 h-64 pointer-events-none z-0">
          <img src="{% static 'images/'|add:logo %}" alt="" class="w-full h-full object-contain logo-accent">
      </div>

      <div class="relative z-10">
        <div class="mb-6 md:mb-8">
          <div class="flex items-center justify-between mb-4">
              <button onclick="history.back()" class="back-btn flex items-center justify-center w-10 h-10 rounded-xl border border-slate-100 bg-white text-slate-400 transition-all shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
              </button>
              <div class="bg-white p-2 rounded-xl border border-slate-100 shadow-sm">
                <img src="{% static 'images/'|add:logo %}" alt="Logo" class="h-5 md:h-6 w-auto">
              </div>
          </div>
          <h2 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Ընտրեք ծառայությունը</h2>
          <p class="text-slate-500 text-xs md:text-sm font-medium mt-1">Նշեք Ձեր այցելության նպատակը</p>
        </div>

        <div class="flex flex-col space-y-3 md:space-y-4">
          {% for action in actions %}
          <a href="{% url 'gov_datetime_selection' service_slug branch_name action.slug %}" 
             class="category-btn group flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3 md:py-4 text-left shadow-sm">
            <div class="flex items-center space-x-4">
                <div class="icon-box p-2.5 bg-white rounded-xl border border-slate-100 text-slate-500 shadow-sm transition-all">
                    <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="{{ action.icon }}"></path>
                    </svg>
                </div>
                <span class="text-slate-800 font-bold text-sm md:text-base leading-snug">{{ action.name }}</span>
            </div>
            <svg class="w-4 h-4 md:w-5 md:h-5 text-slate-300 transition-colors group-hover:text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path>
            </svg>
          </a>
          {% endfor %}
        </div>

        <div class="mt-8 text-center">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.25em]">Earlyone © 2026</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
