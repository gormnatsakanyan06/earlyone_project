{% load static %}
<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} - Ծառայություններ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .action-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:hover { 
            transform: translateY(-2px); 
            border-color: #6366f1; /* Indigo-500 */
            background-color: #ffffff;
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.1);
        }
        .icon-box { transition: all 0.3s ease; }
        .action-btn:hover .icon-box { color: #6366f1; background-color: #f5f3ff; }
    </style>
</head>
<body class="flex items-center justify-center p-4" style="background: radial-gradient(circle at top left, #1e293b, #0a0f1a);">

    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[120px] pointer-events-none bg-indigo-500/5"></div>

    <div class="relative w-full max-w-lg">
        <div class="glass-effect rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,0,0,0.4)] p-8 md:p-10 relative overflow-hidden">
            
            <div class="relative z-10">
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-6">
                        <button onclick="history.back()" class="flex items-center justify-center w-11 h-11 rounded-2xl border border-slate-100 bg-white text-slate-400 hover:text-indigo-600 hover:border-indigo-100 transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div class="bg-white p-2.5 rounded-2xl border border-slate-100 shadow-sm">
                            <img src="{% static 'images/' %}{{ logo }}" alt="{{ name }}" class="h-7 w-auto object-contain">
                        </div>
                    </div>
                    
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Ընտրեք ծառայությունը</h2>
                    <div class="flex items-center space-x-2 mt-3">
                        <span class="text-slate-500 text-xs font-medium">{{ branch_name }}  մասնաճյուղ</span>
                    </div>
                </div>

                <div class="flex flex-col space-y-4">
                    {% for action in actions %}
                    <a href="{% url 'utility_datetime_selection' service_slug branch_name action.slug %}" 
                       class="action-btn group flex items-center justify-between bg-slate-50/50 border border-slate-100 rounded-2xl p-5 text-left transition-all">
                        <div class="flex items-center space-x-5">
                            <div class="icon-box w-12 h-12 flex items-center justify-center rounded-xl bg-white border border-slate-100 text-slate-400 group-hover:border-indigo-100 shadow-sm">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="{{ action.icon }}"></path>
                                </svg>
                            </div>
                            <span class="text-slate-800 font-bold text-lg group-hover:text-indigo-600 transition-colors">
                                {{ action.name }}
                            </span>
                        </div>
                        
                        <div class="text-slate-300 group-hover:text-indigo-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </a>
                    {% endfor %}
                </div>

                <div class="mt-10 pt-6 border-t border-slate-50 text-center">
                    <p class="text-slate-300 text-[10px] font-bold uppercase tracking-[0.3em]">Ամրագրման Համակարգ</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
