{% load static %}
<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ name }} - Մասնաճյուղեր</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        
        .branch-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; }
        .branch-btn:hover { 
            transform: translateX(8px); 
            border-color: #6366f1;
            background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        .logo-watermark { opacity: 0.04; transform: rotate(-10deg) scale(1.4); filter: grayscale(100%); }
    </style>
</head>
<body class="flex items-center justify-center p-4" style="background: radial-gradient(circle at top left, #1e293b, #0a0f1a);">

    <div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full blur-[120px] pointer-events-none bg-indigo-500/5"></div>

    <div class="relative w-full max-w-lg">
        <div class="glass-effect rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,0,0,0.4)] p-8 md:p-10 relative overflow-hidden">
            
            <div class="absolute -bottom-10 -right-10 w-64 h-64 pointer-events-none z-0">
                <img src="{% static 'images/' %}{{ logo }}" alt="logo" class="w-full h-full object-contain logo-watermark">
            </div>

            <div class="relative z-10">
                <div class="mb-8">
                    <div class="flex items-center justify-between mb-6">
                        <button onclick="history.back()" class="flex items-center justify-center w-11 h-11 rounded-2xl border border-slate-100 bg-white text-slate-400 hover:text-indigo-600 transition-all shadow-sm">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                        </button>
                        <div class="bg-white p-2.5 rounded-2xl border border-slate-100 shadow-sm">
                            <img src="{% static 'images/' %}{{ logo }}" alt="{{ name }}" class="h-7 w-auto object-contain">
                        </div>
                    </div>
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight leading-tight">Ընտրեք <br>մասնաճյուղը</h2>
                </div>

                <div class="flex flex-col space-y-3 max-h-[400px] overflow-y-auto pr-2">
                    {% for branch in branches %}
                    <a href="{% url 'utility_actions' service_slug branch.name %}" 
                       class="branch-btn group flex items-center justify-between bg-slate-50/50 rounded-2xl p-5 text-left">
                        <div class="flex items-center space-x-4">
                            <div class="w-10 h-10 rounded-xl bg-white border border-slate-100 flex items-center justify-center text-slate-400 group-hover:text-indigo-600 transition-colors">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                            <div>
                                <span class="text-slate-800 font-bold block">{{ branch.name }}</span>
                                <span class="text-slate-400 text-xs">{{ branch.address }}</span>
                            </div>
                        </div>
                        <svg class="w-5 h-5 text-slate-300 group-hover:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </a>
                    {% endfor %}
                </div>

                <div class="mt-8 text-center">
                    <p class="text-slate-300 text-[10px] font-bold uppercase tracking-[0.2em]">Earlyone © 2026</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
